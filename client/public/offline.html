<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline | Us & Love</title>
  <style>
    body {
      background-color: #0d090b;
      color: #fff0f5;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      text-align: center;
      padding: 20px;
    }
    .heart {
      font-size: 80px;
      color: #ff4a7d;
      animation: heartbeat 1.5s infinite;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 10px;
      font-weight: 600;
    }
    p {
      color: #c3b2bc;
      font-size: 16px;
      max-width: 300px;
      line-height: 1.5;
    }
    .btn {
      margin-top: 25px;
      background: #ff4a7d;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 4px 15px rgba(255, 74, 125, 0.4);
    }
    @keyframes heartbeat {
      0% { transform: scale(1); }
      14% { transform: scale(1.1); }
      28% { transform: scale(1); }
      42% { transform: scale(1.1); }
      70% { transform: scale(1); }
    }
  </style>
</head>
<body>
  <div class="heart">💖</div>
  <h1>You are offline</h1>
  <p>Our love stays connected, but your network didn't. Check your internet connection and try reloading.</p>
  <button class="btn" onclick="window.location.reload()">Try Reloading</button>
</body>
</html>
